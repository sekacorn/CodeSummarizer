name: Repair v1.0.0 release asset names

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/repair-v1-release-assets.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Rename and verify v1.0.0 assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir release-assets
          gh release download v1.0.0 --dir release-assets

          mv "release-assets/Code.Summarizer_1.0.0_x64-setup.exe" \
            "release-assets/CodeSummarizer-1.0.0-windows-x64-setup.exe"
          mv "release-assets/Code.Summarizer_1.0.0_x64_en-US.msi" \
            "release-assets/CodeSummarizer-1.0.0-windows-x64.msi"

          (
            cd release-assets
            sha256sum \
              CodeSummarizer-1.0.0-windows-x64.msi \
              CodeSummarizer-1.0.0-windows-x64-portable.zip \
              CodeSummarizer-1.0.0-windows-x64-setup.exe > SHA256SUMS.txt
          )

          gh release upload v1.0.0 \
            release-assets/CodeSummarizer-1.0.0-windows-x64-setup.exe \
            release-assets/CodeSummarizer-1.0.0-windows-x64.msi \
            --clobber

          gh release delete-asset v1.0.0 "Code.Summarizer_1.0.0_x64-setup.exe" --yes
          gh release delete-asset v1.0.0 "Code.Summarizer_1.0.0_x64_en-US.msi" --yes
          gh release upload v1.0.0 release-assets/SHA256SUMS.txt --clobber

          release_json="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/v1.0.0")"
          for expected in \
            "CodeSummarizer-1.0.0-windows-x64-setup.exe" \
            "CodeSummarizer-1.0.0-windows-x64.msi" \
            "CodeSummarizer-1.0.0-windows-x64-portable.zip" \
            "SHA256SUMS.txt"; do
            jq -e --arg name "$expected" '.assets[] | select(.name == $name)' <<<"$release_json" >/dev/null
          done

          while read -r hash name; do
            jq -e --arg name "$name" --arg digest "sha256:$hash" \
              '.assets[] | select(.name == $name and .digest == $digest)' <<<"$release_json" >/dev/null
          done < release-assets/SHA256SUMS.txt
