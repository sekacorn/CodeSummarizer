name: Windows build and release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run TypeScript, schema, Rust, redaction, and release checks
        run: npm run verify

      - name: Verify tag matches application version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match application version v$version"
          }

      - name: Build Windows installers, portable ZIP, and checksums
        shell: pwsh
        run: ./scripts/build-windows.ps1 -SkipChecks

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CodeSummarizer-Windows-${{ github.ref_name }}
          path: artifacts/*
          if-no-files-found: error

      - name: Create GitHub release for version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/* --verify-tag --generate-notes --title "Code Summarizer ${{ github.ref_name }}"
